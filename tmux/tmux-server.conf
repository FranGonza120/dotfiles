## Configuraciones
set -g base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g renumber-windows on
set -g set-clipboard on
set -g default-terminal 'xterm-256color'
set -g status-justify left
set -g history-limit 50000
set -g display-time 4000
set -g status-keys vi
set -g mode-keys vi
set -g focus-events on
setw -g aggressive-resize on
set -g mouse on
set-option -g terminal-overrides ',xterm-256color:RGB'

## Keybindings
set -g prefix ^B
bind * list-clients

bind ^X lock-server
bind ^C new-window -c "$HOME"
bind ^D detach

bind C-p previous-window
bind C-n next-window
bind r command-prompt "rename-window %%"
bind R source-file ~/.config/tmux/tmux.conf
bind ^W list-windows
bind w list-windows
bind S choose-tree -Zs
bind z resize-pane -Z
bind ^L refresh-client
bind l refresh-client
bind | split-window
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind P set pane-border-status
bind R source-file ~/.config/tmux/tmux.conf
bind q kill-pane
bind x swap-pane -D
bind K send-keys "clear"\; send-keys "Enter"
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'
bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# Tema
background="#24283b"
foreground="#a9b1d6"
black="#414868"
blue="#7aa2f7"
cyan="#7dcfff"
green="#73daca"
magenta="#bb9af7"
red="#f7768e"
white="#a9b1d6"
yellow="#e0af68"
bblack="#414868"
bblue="#7aa2f7"
bcyan="#7dcfff"
bgreen="#41a6b5"
bmagenta="#bb9af7"
bred="#f7768e"
bwhite="#787c99"
byellow="#e0af68"

reset="#[fg=${foreground},bg=${background},nobold,noitalics,nounderscore,nodim]"

set -g status-left-length 80
set -g status-right-length 150


# Highlight colors
set -g mode-style "fg=${bgreen},bg=${bblack}"
set -g message-style "bg=${blue},fg=${bblack}"
set -g message-command-style "fg=${blue},bg=${bblack}"
set -g pane-border-style "fg=${bblack}"
set -g pane-active-border-style "fg=${blue}"
set -g pane-border-status off
set -g status-style bg="${background}"
set -g popup-border-style "fg=${blue}"

# Status Bar
set -g status-left "#[fg=${bblack},bg=${blue},bold] #{?client_prefix,⚡ , }#[bold,nodim]#S "
set -g window-status-current-format "${reset}#[fg=${green},bg=${bblack}] #I #[fg=${foreground},bold,nodim]#W#[nobold]#{?window_zoomed_flag, ⤢, } "
set -g window-status-format "${reset}#[fg=${foreground}] #I #[fg=${foreground},bold,dim]#W#[nobold,dim]#{?window_zoomed_flag, ⤢, } "
set -g status-right "#[fg=${bblack},bg=${blue},bold,nodim] %H:%M "

set -g window-status-separator ""
